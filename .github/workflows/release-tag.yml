name: weekly-snapshot

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:
    inputs:
      snapshot_date:
        description: Optional override in YYYY.MM.DD format for manual recovery.
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: weekly-snapshot-main
  cancel-in-progress: false

jobs:
  create-snapshot-tag:
    name: Create weekly snapshot tag on main
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository for local action files
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main

      - name: Create weekly snapshot tag through GitHub API
        id: snapshot-tag
        uses: ./
        with:
          snapshot_date: ${{ inputs.snapshot_date }}
          create_if_missing: 'true'
          target_ref: main
          github_token: ${{ github.token }}

      - name: Report snapshot tag result
        env:
          TAG: ${{ steps.snapshot-tag.outputs.tag }}
          TAG_EXISTS: ${{ steps.snapshot-tag.outputs.tag_exists }}
          CREATED: ${{ steps.snapshot-tag.outputs.created }}
          TARGET_SHA: ${{ steps.snapshot-tag.outputs.target_sha }}
        run: echo "Snapshot tag ${TAG} already_existed=${TAG_EXISTS} created=${CREATED} target_sha=${TARGET_SHA}"
