name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Smoke test local action
        id: smoke-test
        uses: ./
        with:
          snapshot_date: 2099.12.31
          github_token: ${{ github.token }}

      - name: Assert smoke test outputs
        env:
          TAG: ${{ steps.smoke-test.outputs.tag }}
          TAG_EXISTS: ${{ steps.smoke-test.outputs.tag_exists }}
          CREATED: ${{ steps.smoke-test.outputs.created }}
        run: |
          test "$TAG" = "v2099.12.31"
          test "$TAG_EXISTS" = "false"
          test "$CREATED" = "false"

      - name: Verify committed dist is up to date
        run: git diff --exit-code -- dist
